name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    environment: APPLE_CERTIFICATE
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-aarch64

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Verify signing & notarization secrets are present
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for var in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD \
                     APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD \
                     APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var secret is empty — Apple signing/notarization or .sig generation will silently fail."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Configure missing secrets in repo Settings > Environments > APPLE_CERTIFICATE."
            exit 1
          fi
          echo "All 8 signing & notarization secrets present."

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin

      - name: List bundle contents (diagnostic)
        if: always()
        shell: bash
        run: |
          bundle_dir="src-tauri/target/aarch64-apple-darwin/release/bundle"
          if [ -d "$bundle_dir" ]; then
            find "$bundle_dir" -maxdepth 3 -type f | sort
          else
            echo "Bundle dir does not exist: $bundle_dir"
          fi

      - name: Rename artifacts with platform suffix
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/aarch64-apple-darwin/release/bundle"
          shopt -s nullglob
          for f in "$bundle_dir"/dmg/*_aarch64.dmg; do
            mv -v "$f" "${f/_aarch64.dmg/_macOS-arm64.dmg}"
          done
          # .app.tar.gz 是 updater 实际下载的产物,跟随其后的 .sig 也一并改名
          for f in "$bundle_dir"/macos/*.app.tar.gz; do
            [ -f "$f" ] || continue
            base="$(basename "$f" .app.tar.gz)"
            new="$bundle_dir/macos/${base}_macOS-arm64.app.tar.gz"
            mv -v "$f" "$new"
            if [ -f "${f}.sig" ]; then
              mv -v "${f}.sig" "${new}.sig"
            fi
          done

      - name: Upload .sig artifact (for manifest job)
        uses: actions/upload-artifact@v4
        with:
          name: sig-macos
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    environment: APPLE_CERTIFICATE
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-x64

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Verify Tauri signing secrets are present
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty - .sig files will not be generated."
            exit 1
          }
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is empty - bundle signing will fail."
            exit 1
          }
          Write-Host "TAURI signing secrets present."

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: List bundle contents (diagnostic)
        if: always()
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if (Test-Path $bundleDir) {
            Get-ChildItem -Path $bundleDir -Recurse -File | Select-Object -ExpandProperty FullName | Sort-Object
          } else {
            Write-Host "Bundle dir does not exist: $bundleDir"
          }

      - name: Rename artifacts with platform suffix
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          Get-ChildItem -Path (Join-Path $bundleDir 'msi') -Filter '*_x64_en-US.msi' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64_en-US\.msi$', '_windows-x64.msi'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }

          Get-ChildItem -Path (Join-Path $bundleDir 'nsis') -Filter '*_x64-setup.exe' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64-setup\.exe$', '_windows-x64-setup.exe'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }

          # NSIS .nsis.zip: updater 实际下载的产物,带 .sig
          Get-ChildItem -Path (Join-Path $bundleDir 'nsis') -Filter '*_x64-setup.nsis.zip' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64-setup\.nsis\.zip$', '_windows-x64-setup.nsis.zip'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }
          Get-ChildItem -Path (Join-Path $bundleDir 'nsis') -Filter '*_x64-setup.nsis.zip.sig' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64-setup\.nsis\.zip\.sig$', '_windows-x64-setup.nsis.zip.sig'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }

      - name: Upload .sig artifact (for manifest job)
        uses: actions/upload-artifact@v4
        with:
          name: sig-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    environment: APPLE_CERTIFICATE
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (x86_64-unknown-linux-gnu)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: linux-x64

      - name: Install system deps (webkit2gtk + tray + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            file

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Verify Tauri signing secrets are present
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty - .sig files will not be generated."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is empty - bundle signing will fail."
            exit 1
          fi
          echo "TAURI signing secrets present."

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 显式只打 deb + AppImage; 跳过 rpm (Ubuntu runner 上工具链不稳)
          args: --target x86_64-unknown-linux-gnu --bundles deb,appimage

      - name: List bundle contents (diagnostic)
        if: always()
        shell: bash
        run: |
          bundle_dir="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          if [ -d "$bundle_dir" ]; then
            find "$bundle_dir" -maxdepth 3 -type f | sort
          else
            echo "Bundle dir does not exist: $bundle_dir"
          fi

      - name: Rename artifacts with platform suffix
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          shopt -s nullglob
          # deb 不参与 updater (无 .sig)
          for f in "$bundle_dir"/deb/*_amd64.deb; do
            mv -v "$f" "${f/_amd64.deb/_linux-x64.deb}"
          done
          # AppImage 是 updater 产物,带 .sig
          for f in "$bundle_dir"/appimage/*_amd64.AppImage; do
            new="${f/_amd64.AppImage/_linux-x64.AppImage}"
            mv -v "$f" "$new"
            if [ -f "${f}.sig" ]; then
              mv -v "${f}.sig" "${new}.sig"
            fi
          done

      - name: Upload .sig artifact (for manifest job)
        uses: actions/upload-artifact@v4
        with:
          name: sig-linux
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error
          retention-days: 1

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig

  generate-manifest:
    name: Generate latest.json
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download .sig artifacts from build jobs
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: sig-*
          merge-multiple: true

      - name: List collected .sig files
        run: ls -la sigs

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/generate-latest-json.mjs "$RELEASE_TAG" sigs latest.json

      - name: Upload latest.json to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: latest.json

  publish:
    name: Publish release
    needs: [generate-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Flip draft to published
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              throw new Error(`Release for tag ${tag} not found`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            core.info(`Published release ${tag} (id=${release.id})`);
