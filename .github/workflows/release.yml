name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    environment: APPLE_CERTIFICATE
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-aarch64

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build, sign & notarize
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target aarch64-apple-darwin

      - name: Rename artifacts with platform suffix
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/aarch64-apple-darwin/release/bundle"
          shopt -s nullglob
          for f in "$bundle_dir"/dmg/*_aarch64.dmg; do
            mv -v "$f" "${f/_aarch64.dmg/_macOS-arm64.dmg}"
          done
          for f in "$bundle_dir"/macos/*.app.tar.gz; do
            base="$(basename "$f" .app.tar.gz)"
            mv -v "$f" "$bundle_dir/macos/${base}_macOS-arm64.app.tar.gz"
          done

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: cc-router ${{ env.RELEASE_TAG }}
          body: |
            自动构建产物：
            - macOS (Apple Silicon): `cc-router_<version>_macOS-arm64.dmg`
            - Windows x64: `cc-router_<version>_windows-x64.msi` / `cc-router_<version>_windows-x64-setup.exe`
          draft: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-x64

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Rename artifacts with platform suffix
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          Get-ChildItem -Path (Join-Path $bundleDir 'msi') -Filter '*_x64_en-US.msi' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64_en-US\.msi$', '_windows-x64.msi'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }

          Get-ChildItem -Path (Join-Path $bundleDir 'nsis') -Filter '*_x64-setup.exe' -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '_x64-setup\.exe$', '_windows-x64-setup.exe'
            Write-Host "Renaming $($_.Name) -> $newName"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
          }

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: cc-router ${{ env.RELEASE_TAG }}
          body: |
            自动构建产物：
            - macOS (Apple Silicon): `cc-router_<version>_macOS-arm64.dmg`
            - Windows x64: `cc-router_<version>_windows-x64.msi` / `cc-router_<version>_windows-x64-setup.exe`
          draft: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  publish:
    name: Publish release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Flip draft to published
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              throw new Error(`Release for tag ${tag} not found`);
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            core.info(`Published release ${tag} (id=${release.id})`);
