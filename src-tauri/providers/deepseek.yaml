id: deepseek
display_name: "DeepSeek"
icon: deepseek
description: "DeepSeek 官方 Anthropic 兼容端点"
homepage: "https://www.deepseek.com"
docs_url: "https://api-docs.deepseek.com/zh-cn/guides/anthropic_api"
api_key_url: "https://platform.deepseek.com/api_keys"

compatibility: verified

endpoints:
  - id: anthropic_endpoint
    label: "国内版 · 按量付费 API"
    description: "DeepSeek 官方提供的 Anthropic Messages 兼容端点"
    base_url: "https://api.deepseek.com/anthropic"
    messages_path: "/v1/messages"
    region: global
    billing: pay_as_you_go

default_endpoint: anthropic_endpoint

auth:
  type: api_key
  header_name: "Authorization"
  header_format: bearer

required_headers:
  anthropic-version: "2023-06-01"

forward_headers: []

# Anthropic 兼容子集 quirk: DeepSeek 要求每个含 tool_use 的 assistant 消息必须有 thinking
# content_block 开头, 否则触发 400 "thinking must be passed back to the API". 多 provider
# 轮询时由 GLM/anthropic 等不发 thinking 的 provider 生成的 assistant 消息回灌到 DeepSeek
# 时会触发, cc-router 在透传前给缺 thinking 的 assistant 消息插入空 placeholder 解决.
# 实测 (2026-05-16): 空 placeholder 被 DeepSeek 接受, 用户已有 thinking 上下文保持不变.
inject_missing_thinking_placeholder: true

model_discovery:
  enabled: true
  # DeepSeek 的 /models 接口位于主站根目录, 不在 Anthropic 兼容端点下
  # 参考: https://api-docs.deepseek.com/zh-cn/api/list-models
  url: "https://api.deepseek.com/models"
  path: "/v1/models"
  cache_ttl_hours: 24
  example_models:
    - "deepseek-v4-pro"
    - "deepseek-v4-flash"

# 余额查询: 本期仅 DeepSeek 接入. 响应 {is_available, balance_infos[]} 多币种数组,
# Rust 侧 balance_discovery::parse_deepseek 翻译成统一 BalanceSnapshot.
# 接口位于主站根目录, 与 messages (anthropic 兼容端点) 不同域, 故用完整 URL.
balance_discovery:
  enabled: true
  url: "https://api.deepseek.com/user/balance"
  method: GET
  parser: deepseek
  cache_ttl_minutes: 10

